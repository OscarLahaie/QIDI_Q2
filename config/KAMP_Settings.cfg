# Below you can include specific configuration files depending on what you want KAMP to do:
#
##[include ./KAMP/Adaptive_Meshing.cfg]       # Not used here: native Klipper adaptive mesh is enabled in G29.
##[include ./KAMP/Line_Purge.cfg]             # Include to enable adaptive line purging configuration.
##[include ./KAMP/Voron_Purge.cfg]            # Include to enable adaptive Voron logo purging configuration.
##[include ./KAMP/Smart_Park.cfg]             # Include to enable the Smart Park function.

[gcode_macro _KAMP_Settings]
description: Optional settings store for KAMP purge and park features

# Native Klipper adaptive bed mesh is used through:
#   BED_MESH_CALIBRATE PROFILE=kamp ADAPTIVE=1 ADAPTIVE_MARGIN=<value>
# The margin is configured in [bed_mesh] via adaptive_margin.

variable_verbose_enable: True
variable_mesh_margin: 5
variable_fuzz_amount: 0
variable_probe_dock_enable: False
variable_attach_macro: 'Attach_Probe'
variable_detach_macro: 'Dock_Probe'
variable_purge_height: 0.8
variable_tip_distance: 0
variable_purge_margin: 10
variable_purge_amount: 30
variable_flow_rate: 12
variable_smart_park_height: 10

gcode:
    {action_respond_info(" Native Klipper adaptive bed mesh is active via G29. _KAMP_Settings only stores optional purge and park values. ")}
